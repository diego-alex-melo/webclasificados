<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sin conexión — BrujosClassifieds</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e2e2e9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #9898a6;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .retry-btn {
      display: inline-block;
      background: #a855f7;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    .retry-btn:hover { background: #9333ea; }
    .home-link {
      display: block;
      margin-top: 1rem;
      color: #f59e0b;
      text-decoration: none;
      font-size: 0.875rem;
    }
    .home-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>No se pudo conectar al servidor. Verifica tu conexión a internet e intenta de nuevo.</p>
    <button class="retry-btn" onclick="location.reload()">Reintentar</button>
    <a href="/" class="home-link">Volver al inicio</a>
  </div>
</body>
</html>
